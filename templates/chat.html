<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BillWise Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/chat.css" />
</head>
<body>

  <div id="app">

    <!-- Header -->
    <header>
      <div class="header-inner">
        <div class="header-left">
          <div class="header-logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
              <rect x="9" y="3" width="6" height="4" rx="1"/>
              <line x1="9" y1="12" x2="15" y2="12"/>
              <line x1="9" y1="16" x2="13" y2="16"/>
            </svg>
          </div>
          <span class="header-title">BillWise</span>
        </div>
        <div class="header-actions">
          <button id="btn-reload" title="Reload data from storage">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Reload
          </button>
          <button id="btn-reset" title="Clear conversation">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
            </svg>
            New chat
          </button>
        </div>
      </div>
    </header>

    <!-- Message thread -->
    <main id="messages">
      <div class="message assistant">
        <div class="avatar bw-avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <line x1="9" y1="12" x2="15" y2="12"/>
            <line x1="9" y1="16" x2="13" y2="16"/>
          </svg>
        </div>
        <div class="message-body">
          <div class="message-content">
            Hi! I can answer questions about your bills and spending.<br><br>
            Try asking: <em>"How much did I spend last month?"</em> or <em>"Which store do I visit most?"</em>
          </div>
        </div>
      </div>
    </main>

    <!-- Input area -->
    <footer id="input-bar">
      <div class="input-container">
        <div class="input-wrapper">
          <textarea
            id="input"
            rows="1"
            placeholder="Ask anything about your bills…"
            autofocus
          ></textarea>
          <button id="btn-send" title="Send (Enter)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for newline</p>
      </div>
    </footer>

  </div>

  <script src="/static/chat.js"></script>
</body>
</html>
